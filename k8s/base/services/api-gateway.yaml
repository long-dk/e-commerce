---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: production
  labels:
    app: api-gateway
    version: v1
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 4000
    targetPort: 4000
    protocol: TCP

---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: production
  labels:
    app: api-gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ecommerce-service
      imagePullPolicy: IfNotPresent
      containers:
      - name: api-gateway
        image: ecommerce-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 4000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        env:
        - name: SERVICE_NAME
          value: "api-gateway"
        - name: SERVICE_PORT
          value: "4000"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: NODE_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: LOG_LEVEL
        
        # Service URLs
        - name: AUTH_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: AUTH_SERVICE_HOST
        - name: AUTH_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: AUTH_SERVICE_PORT
        - name: PRODUCTS_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: PRODUCTS_SERVICE_HOST
        - name: PRODUCTS_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: PRODUCTS_SERVICE_PORT
        - name: ORDERS_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: ORDERS_SERVICE_HOST
        - name: ORDERS_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: ORDERS_SERVICE_PORT
        - name: PAYMENTS_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: PAYMENTS_SERVICE_HOST
        - name: PAYMENTS_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: PAYMENTS_SERVICE_PORT
        - name: INVENTORY_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: INVENTORY_SERVICE_HOST
        - name: INVENTORY_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: INVENTORY_SERVICE_PORT
        - name: SHIPPING_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: SHIPPING_SERVICE_HOST
        - name: SHIPPING_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: SHIPPING_SERVICE_PORT
        - name: NOTIFICATIONS_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: NOTIFICATIONS_SERVICE_HOST
        - name: NOTIFICATIONS_SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: NOTIFICATIONS_SERVICE_PORT
        
        # OTLP Tracing
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
