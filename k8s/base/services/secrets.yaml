---
# Sealed Secret template - these will be encrypted with Sealed Secrets
# Base64 encoded example values (for reference only):
# ecommerce_user: ZWNvbW1lcmNlX3VzZXI=
# ecommerce_password: ZWNvbW1lcmNlX3Bhc3N3b3Jk

apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: production
type: Opaque
stringData:
  # PostgreSQL credentials
  DATABASE_USER: "ecommerce_user"
  DATABASE_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"
  
  # MongoDB credentials
  MONGODB_USER: "ecommerce_user"
  MONGODB_PASSWORD: "CHANGE_ME_MONGODB_PASSWORD"
  
  # Redis
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
  
  # JWT & Auth
  JWT_SECRET: "CHANGE_ME_JWT_SECRET_GENERATE_WITH_openssl_rand_hex_32"
  JWT_EXPIRATION: "3600"
  
  # OAuth2 - these need to be configured from your providers
  OAUTH2_GOOGLE_CLIENT_ID: ""
  OAUTH2_GOOGLE_CLIENT_SECRET: ""
  OAUTH2_GITHUB_CLIENT_ID: ""
  OAUTH2_GITHUB_CLIENT_SECRET: ""
  
  # Payment processor
  STRIPE_API_KEY: "CHANGE_ME_STRIPE_KEY"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME_STRIPE_WEBHOOK_SECRET"
  
  # Notifications
  SMTP_HOST: "mailhog.production.svc.cluster.local"
  SMTP_PORT: "1025"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  
  # Monitoring credentials
  ELASTIC_PASSWORD: "CHANGE_ME_ELASTIC_PASSWORD"
  ENCRYPTION_KEY: "CHANGE_ME_ENCRYPTION_KEY"
  
  # Slack alerts
  SLACK_WEBHOOK_URL: "CHANGE_ME_SLACK_WEBHOOK_URL"

---
# Secret for image pull (if using private registry)
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: production
type: kubernetes.io/dockercfg
data:
  # .dockercfg: BASE64_ENCODED_DOCKER_CONFIG
