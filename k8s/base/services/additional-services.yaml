---
# Payments Service
apiVersion: v1
kind: Service
metadata:
  name: payments-service
  namespace: production
  labels:
    app: payments-service
spec:
  type: ClusterIP
  selector:
    app: payments-service
  ports:
  - name: http
    port: 4004
    targetPort: 4004

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: payments-service
  template:
    metadata:
      labels:
        app: payments-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: ecommerce-service
      containers:
      - name: payments-service
        image: ecommerce-payments-service:latest
        ports:
        - name: http
          containerPort: 4004
        env:
        - name: SERVICE_NAME
          value: "payments-service"
        - name: SERVICE_PORT
          value: "4004"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: NODE_ENV
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: DATABASE_PORT
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_NAME
          value: "payments_db"
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: STRIPE_API_KEY
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: STRIPE_WEBHOOK_SECRET
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: KAFKA_BROKERS
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        resources:
          requests:
            cpu: "150m"
            memory: "192Mi"
          limits:
            cpu: "400m"
            memory: "384Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 4004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 4004
          initialDelaySeconds: 10
          periodSeconds: 5

