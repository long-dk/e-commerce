input {
  udp {
    port => 5000
    codec => json
  }
  tcp {
    port => 5000
    codec => json
  }
  beats {
    port => 5001
  }
}

filter {
  if [type] == "nodejs" {
    if [message] =~ /^\{.*\}$/ {
      json {
        source => "message"
      }
    }
  }
  
  # Add service identification from host
  if ![service_name] {
    grok {
      match => { "host" => "^%{DATA:service_name}.+$" }
    }
  }
  
  # Add timestamp if not present
  if ![@timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
  }
  
  # Console output for debugging
  stdout {
    codec => rubydebug
  }
}
